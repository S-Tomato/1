<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 | Powered by Cloudflare</title>
    <style>
        /* 现代简约风格设计 */
        :root {
            --primary-color: #f6821f; /* Cloudflare 橙 */
            --bg-color: #f9faec;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        p {
            line-height: 1.6;
            color: #666;
        }

        .links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #999;
        }

        /* 响应式适配手机 */
        @media (max-width: 480px) {
            .container { margin: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Fuck，Foolish bird！</h1>
        <p>这是我通过 <strong>天赋</strong> 部署的首个网站。</p>
        <p>代码托管在 你妈妈那里，每次推送更新，网站都会在全球边缘节点自动同步簸箕粄。</p>
        
        <div class="links">
            <a href="https://github.com" class="btn">GitHub</a>
            <a href="#" class="btn" style="background: #333;">关于我，你就不必知道太多</a>
        </div>

        <div class="footer">
            &copy; 2026 · 基于 Cloudflare & GitHub 构建
        </div>
    </div>

</body>
</html>
